# Integration Quality Scale Assessment
# https://developers.home-assistant.io/docs/core/integration-quality-scale/

rules:
  # Bronze
  action-setup:
    status: done
    comment: Services registered in async_setup with proper validation schemas
  appropriate-polling:
    status: done
    comment: DataUpdateCoordinator with fixed 30s interval (local network minimum)
  brands:
    status: todo
    comment: No brand assets in HA brands repository
  common-modules:
    status: done
    comment: Shared base classes, const.py, coordinator.py, entity.py
  config-flow:
    status: done
    comment: Full UI config flow with options and reconfigure support
  config-flow-test-coverage:
    status: done
    comment: tests/test_config_flow.py covers success, errors, options
  dependency-transparency:
    status: done
    comment: API client is vendored under custom_components/unraid_management_agent/api
  docs-actions:
    status: done
    comment: README documents all integration services with grouped examples
  docs-high-level-description:
    status: done
    comment: README has project description
  docs-installation-instructions:
    status: done
    comment: README documents prerequisites plus HACS and manual installation paths
  docs-removal-instructions:
    status: done
    comment: README includes Home Assistant, HACS, manual, and backend plugin removal steps
  entity-event-setup:
    status: done
    comment: Uses CoordinatorEntity pattern correctly
  entity-unique-id:
    status: done
    comment: All entities have unique_id based on entry_id and key
  has-entity-name:
    status: done
    comment: _attr_has_entity_name = True in base entity class
  runtime-data:
    status: done
    comment: Uses entry.runtime_data with UnraidRuntimeData dataclass
  test-before-configure:
    status: done
    comment: Calls get_system_info() before creating entry
  test-before-setup:
    status: done
    comment: health_check() raises ConfigEntryNotReady on failure
  unique-config-entry:
    status: done
    comment: Uses async_set_unique_id + _abort_if_unique_id_configured

  # Silver
  action-exceptions:
    status: done
    comment: Services raise HomeAssistantError with proper messages on failure
  config-entry-unloading:
    status: done
    comment: async_unload_entry properly stops WebSocket and closes client
  docs-configuration-parameters:
    status: done
    comment: README documents host, port, websocket option, and fixed polling behavior
  docs-installation-parameters:
    status: done
    comment: README documents prerequisites, system requirements, network requirements, and setup parameters
  entity-unavailable:
    status: done
    comment: Entities use CoordinatorEntity which handles unavailability
  integration-owner:
    status: done
    comment: "@ruaan-deysel in manifest.json codeowners"
  log-when-unavailable:
    status: done
    comment: Logs unavailability once with recovery message
  parallel-updates:
    status: done
    comment: PARALLEL_UPDATES = 0 in all platform files
  reauthentication-flow:
    status: exempt
    comment: No authentication required (local API without credentials)
  test-coverage:
    status: done
    comment: The isolated pytest suite enforces a 95% coverage floor for the integration package, excluding the vendored api helper package

  # Gold
  devices:
    status: done
    comment: All entities grouped under single Unraid device with proper DeviceInfo
  diagnostics:
    status: done
    comment: diagnostics.py with redacted config and coordinator data
  discovery:
    status: exempt
    comment: Local push integration, manual setup appropriate
  discovery-update-info:
    status: exempt
    comment: No discovery mechanism
  docs-data-update:
    status: done
    comment: README documents initial load, websocket updates, and 30-second REST fallback polling
  docs-examples:
    status: done
    comment: README includes multiple automation examples for alerts and control actions
  docs-known-limitations:
    status: done
    comment: README documents manual setup, websocket fallback behavior, conditional entities, and legacy registry limitations
  docs-supported-devices:
    status: done
    comment: README documents supported Unraid versions, Home Assistant setup mode, and conditional subsystem support
  docs-supported-functions:
    status: done
    comment: README documents entity platforms, services, and supported subsystem coverage
  docs-troubleshooting:
    status: done
    comment: README includes a troubleshooting section for connectivity, websocket, updates, and missing entities
  docs-use-cases:
    status: done
    comment: README includes concrete monitoring, automation, orchestration, and energy dashboard use cases
  dynamic-devices:
    status: exempt
    comment: Single device per config entry, dynamic entities created at setup
  entity-category:
    status: done
    comment: EntityCategory.DIAGNOSTIC used for appropriate sensors
  entity-device-class:
    status: done
    comment: Proper device classes (temperature, power, battery, duration, etc.)
  entity-disabled-by-default:
    status: done
    comment: User scripts disabled by default with _attr_entity_registry_enabled_default
  entity-translations:
    status: done
    comment: Entity translations defined in strings.json entity section
  exception-translations:
    status: done
    comment: All HomeAssistantError and UpdateFailed use translation_domain/translation_key/translation_placeholders
  icon-translations:
    status: done
    comment: icons.json with state-based icons for entities and services
  reconfiguration-flow:
    status: done
    comment: async_step_reconfigure implemented to change host/port
  repair-issues:
    status: done
    comment: repairs.py implemented for disk health and temperature issues
  stale-devices:
    status: exempt
    comment: Single device per entry, removed on unload

  # Platinum
  async-dependency:
    status: done
    comment: Vendored API client is fully async
  inject-websession:
    status: done
    comment: Uses async_get_clientsession(hass) for shared session pooling in __init__.py and config_flow.py
  strict-typing:
    status: done
    comment: Typed integration modules pass repo type checks and ship a py.typed marker
