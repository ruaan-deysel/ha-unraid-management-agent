name: HACS Action

permissions: {}

on:
  push:
    branches:
      - main
      - "enhancement/**"
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  hacs:
    name: HACS Action
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    steps:
      - name: HACS Action
        uses: "hacs/action@dcb30e72781db3f207d5236b861172774ab0b485" # main
        with:
          category: "integration"
