name: HACS Action

permissions: {}

on:
  push:
    branches:
      - main
      - "enhancement/**"
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  hacs:
    name: HACS Action
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    steps:
      - name: HACS Action
        uses: "hacs/action@1ebf01c408f29afcb6406bd431bc98fd8cbb15aa" # main
        with:
          category: "integration"
