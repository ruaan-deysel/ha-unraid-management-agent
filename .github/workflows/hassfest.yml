name: Validate with hassfest

permissions: {}

on:
  push:
    branches:
      - main
      - "enhancement/**"
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

jobs:
  validate:
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    steps:
      - uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6
      - uses: "home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b" # master
